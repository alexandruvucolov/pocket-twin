name: Build & Push LatentSync Worker

on:
    workflow_dispatch: # manual trigger from GitHub UI
    push:
        paths:
            - "latentsync-runpod-worker/**"
            - "live-avatar-backend/latentsync_infer.py"

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4.2.2

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3.10.0

            - name: Log in to Docker Hub
              uses: docker/login-action@v3.4.0
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build and push
              uses: docker/build-push-action@v6.15.0
              with:
                  context: .
                  file: latentsync-runpod-worker/Dockerfile
                  push: true
                  tags: |
                      alexandruvucolov/pocket-twin-latentsync:v2
                      alexandruvucolov/pocket-twin-latentsync:v3
                      alexandruvucolov/pocket-twin-latentsync:latest
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
